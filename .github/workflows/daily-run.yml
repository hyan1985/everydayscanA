name: 每日选股流水线

on:
  schedule:
    # 北京时间 18:00 (UTC+8) = UTC 10:00，周一到周五
    - cron: "0 10 * * 1-5"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run-strategies:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      pages_ready: ${{ steps.pages.outputs.ready }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore Tushare parquet cache
        uses: actions/cache@v4
        with:
          path: data
          key: tushare-parquet-${{ github.run_id }}
          restore-keys: |
            tushare-parquet-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all strategies + aggregate
        id: pipeline
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          # CI 无本地缓存，超时需比本机更长
          LH_QUANT_HEAL_WAIT: "900"
          TIMEOUT_QL_DRAGON: "360"
          TIMEOUT_ZHUSH: "360"
          TIMEOUT_PH_AFTERCLOSE: "360"
          TIMEOUT_LH_QUANT: "1800"
          TIMEOUT_STORAGE_IPO: "240"
          TASK_INTERVAL: "5"
        run: bash run_all.sh

      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-output-${{ github.run_id }}
          path: |
            output/unified_dashboard.html
            output/unified_wechat.txt
            output/unified_all_picks.csv
            output/.run_status.json
          if-no-files-found: warn
          retention-days: 30

      - name: Prepare GitHub Pages site
        if: always() && steps.pipeline.outcome != 'cancelled'
        id: pages
        run: |
          if [ ! -f output/unified_dashboard.html ]; then
            echo "::warning::看板文件不存在，跳过 Pages 发布"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p _site
          cp output/index.html _site/ 2>/dev/null || true
          cp output/unified_dashboard.html _site/
          cp output/unified_wechat.txt _site/ 2>/dev/null || true
          cp output/unified_all_picks.csv _site/ 2>/dev/null || true
          cp output/.run_status.json _site/ 2>/dev/null || true
          if [ ! -f _site/index.html ]; then
            printf '%s\n' \
              '<!DOCTYPE html>' \
              '<meta charset="UTF-8">' \
              '<meta http-equiv="refresh" content="0;url=unified_dashboard.html">' \
              '<title>统一选股看板</title>' \
              '<a href="unified_dashboard.html">统一选股看板</a>' \
              > _site/index.html
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "Pages site prepared with $(wc -c < _site/unified_dashboard.html) bytes dashboard"

      - name: Setup Pages
        if: steps.pages.outputs.ready == 'true'
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: steps.pages.outputs.ready == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Commit daily output back to repo
        if: always() && steps.pipeline.outcome == 'success'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if [ -d strategies/lh_quant/output/daily ]; then
            git add strategies/lh_quant/output/daily/
          fi
          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi
          git commit -m "daily: auto update $(date -u +%F)"
          git pull --rebase origin main
          git push origin main

  deploy-pages:
    needs: run-strategies
    if: needs.run-strategies.outputs.pages_ready == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
