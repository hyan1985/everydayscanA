strategies:
  - name: "擒龙猎手"
    short: "擒龙"
    workspace: "%SCRIPT_DIR%/strategies/ql_dragon"
    csv_path: "reports/latest_scan.csv"
    fields:
      ts_code: "ts_code"
      name: "name"
      score: "score"
      industry: "industry"
      concept: "concept_tags"
    score_range: [0, 10]
    extra_cols:
      - { src: "s_theme",        label: "题材分" }
      - { src: "s_technical",    label: "技术分" }
      - { src: "s_fundamental",  label: "基本面" }
      - { src: "circ_mv_yi",    label: "流通市值(亿)" }
      - { src: "turnover_rate",  label: "换手率(%)" }

  - name: "主升行情启动"
    short: "主升"
    workspace: "%SCRIPT_DIR%/strategies/zhush_mainrise"
    csv_path: "dragons_candidates.csv"
    fields:
      ts_code: "ts_code"
      name: "name"
      score: "total_score"
      industry: ~
      concept: "concept"
    score_range: [0, 100]
    extra_cols:
      - { src: "penalty",         label: "超涨扣分" }
      - { src: "gap_unfilled",    label: "缺口" }
      - { src: "limit_up_20d",    label: "涨停次数" }
      - { src: "consecutive_yang", label: "连阳" }
      - { src: "circ_mv(亿)",     label: "流通市值(亿)" }
      - { src: "turnover_rate(%)", label: "换手率(%)" }

  - name: "盘后扫描追随"
    short: "追随"
    workspace: "%SCRIPT_DIR%/strategies/ph_afterclose"
    csv_path: "data/picks_archive.csv"
    md_report: "reports/auto.md"
    html_dashboard: "reports/auto_dashboard.html"
    fields:
      ts_code: "code"
      name: "name"
      score: "total_score"
      industry: ~
      concept: ~
    score_range: [0, 40]
    extra_cols:
      - { src: "量能", label: "量能" }
      - { src: "位置", label: "位置" }
      - { src: "题材", label: "题材" }
      - { src: "人气", label: "人气" }
      - { src: "追随", label: "追随" }
      - { src: "安全", label: "安全" }
      - { src: "tag",  label: "标签" }

  - name: "量化蓄势突破"
    short: "蓄势"
    workspace: "%SCRIPT_DIR%/strategies/lh_quant"
    csv_glob: "output/daily/daily_selection_*_cn.csv"
    fields:
      ts_code: "股票代码"
      name: "股票名称"
      score: "score_norm"
      industry: "行业"
      concept: "概念"
    score_range: [0, 100]
    extra_cols:
      - { src: "pool_type",       label: "池" }
      - { src: "pe_ttm",            label: "PE_TTM" }
      - { src: "roe",              label: "ROE(%)" }
      - { src: "roe_pass",         label: "ROE>5%" }
      - { src: "q_rev_yu",         label: "营收增速(%)" }
      - { src: "vol_ratio_3d",     label: "3日量比" }
      - { src: "turnover_60d_avg", label: "60日换手均值(%)" }
      - { src: "bb_width_ratio",   label: "带宽比(收敛)" }
      - { src: "ma_cross",         label: "均线" }
      - { src: "tech_combo",       label: "技术结构" }
      - { src: "tech_adj",         label: "技术加减" }
      - { src: "macd_disp_ratio",  label: "MACD发散比" }
      - { src: "signal_day",       label: "异动日" }
      - { src: "wr14_now",         label: "WR14" }
      - { src: "ths_concept1",     label: "同花顺概念1" }

  - name: "存储IPO供应链"
    short: "存储"
    workspace: "%SCRIPT_DIR%/strategies/lh_quant"
    csv_glob: "output/daily/storage_ipo_action_*.csv"
    file_date_pattern: "^storage_ipo_action_(\\d{8})\\.csv$"
    tier_column: "操作档位"
    tier_score_map:
      可做: 90
      观察: 65
    resonance_tiers: ["可做"]
    display_limit: 40
    fields:
      ts_code: "股票代码"
      name: "股票名称"
      score: null
      industry: "industry"
      concept: "供应链环节"
    score_range: [0, 100]
    extra_cols:
      - { src: "操作档位", label: "档位" }
      - { src: "说明", label: "说明" }
      - { src: "pct_chg", label: "涨跌幅(%)" }
      - { src: "turnover_rate", label: "换手(%)" }
      - { src: "流通市值(亿)", label: "流通市值(亿)" }
      - { src: "主力净流入(万)", label: "主力净流入(万)" }
      - { src: "主概念", label: "主概念" }
